<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#4a90d9"/>
  <!-- Owl body -->
  <ellipse cx="32" cy="38" rx="16" ry="18" fill="#2c5f8a"/>
  <!-- Owl head -->
  <circle cx="32" cy="22" r="12" fill="#2c5f8a"/>
  <!-- Left ear -->
  <polygon points="22,14 18,6 26,12" fill="#2c5f8a"/>
  <!-- Right ear -->
  <polygon points="42,14 46,6 38,12" fill="#2c5f8a"/>
  <!-- Left eye -->
  <circle cx="27" cy="22" r="5" fill="white"/>
  <circle cx="27" cy="22" r="3" fill="#1a1a2e"/>
  <circle cx="28" cy="21" r="1" fill="white"/>
  <!-- Right eye -->
  <circle cx="37" cy="22" r="5" fill="white"/>
  <circle cx="37" cy="22" r="3" fill="#1a1a2e"/>
  <circle cx="38" cy="21" r="1" fill="white"/>
  <!-- Beak -->
  <polygon points="32,26 29,30 35,30" fill="#f5a623"/>
  <!-- Wings -->
  <ellipse cx="18" cy="40" rx="8" ry="12" fill="#1e4a73" transform="rotate(-15,18,40)"/>
  <ellipse cx="46" cy="40" rx="8" ry="12" fill="#1e4a73" transform="rotate(15,46,40)"/>
  <!-- Feet -->
  <line x1="26" y1="54" x2="22" y2="60" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="54" x2="26" y2="61" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="54" x2="30" y2="60" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="54" x2="34" y2="60" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="54" x2="38" y2="61" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="54" x2="42" y2="60" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
</svg>
